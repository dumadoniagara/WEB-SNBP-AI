# ─────────────────────────────────────────────────────────────────────────
# Nginx server block for the SNBP-AI web frontend.
# Place at: /etc/nginx/sites-available/snbp-ai
# Test + reload:  sudo nginx -t && sudo systemctl reload nginx
#
# Routing model:
#   /                -> Next.js frontend (127.0.0.1:3000), incl. its BFF /api/*
#   /api/webhook     -> Spring backend  (127.0.0.1:8080), for the Meta webhook
#   /images/         -> static question images on disk
#
# The frontend's own /api/auth, /api/questions handlers stay on Next. Only the
# WhatsApp webhook is carved out to the backend so Meta keeps working unchanged.
# ─────────────────────────────────────────────────────────────────────────

server {
    server_name srv1728906.hstgr.cloud;

    client_max_body_size 10m;

    # ── WhatsApp webhook → Spring backend (must stay public) ──────────────
    # ^~ gives this prefix priority and stops regex location matching.
    location ^~ /api/webhook {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static question images served from disk ───────────────────────────
    location /images/ {
        alias /app/snbp-ai/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        location ~* \.(png|jpg|jpeg|gif|webp|svg)$ {
            try_files $uri =404;
        }
    }

    # ── Next.js immutable build assets (long cache) ───────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Everything else → Next.js frontend (incl. its BFF /api/*) ─────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # needed for secure cookies
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/srv1728906.hstgr.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/srv1728906.hstgr.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = srv1728906.hstgr.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name srv1728906.hstgr.cloud;
    return 404; # managed by Certbot
}
